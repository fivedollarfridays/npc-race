id: plan-2026-03-npc-race-parts-catalog
title: "Sprint 20: Parts Catalog + Derived Attributes"
type: feature
status: planned
created: "2026-03-20"
sprint: 20
total_complexity: 120

description: |
  Replace abstract 100-point stat budget with component-based car building.
  Players select engine, aero package, suspension, brakes, weight reduction,
  cooling package, and gearbox. Each component has real-ish specs that combine
  into 8 derived performance attributes. Budget cap ($140M) replaces point budget.

  Sprint 20 builds the data layer. Sprint 21 wires it into simulation.
  Sprint 22 migrates seed cars and validates.

