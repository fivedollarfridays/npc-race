description: 'Build the physics engine that calls 10 player-written part functions
  per tick.

  Each part (engine_map, gearbox, ers_deploy, brake_bias, etc.) is a real car

  part controlled by code. The player writes the code that makes each part work.

  The physics engine applies all part decisions to produce car behavior.


  Mantra: You''re building a car out of code. Each function IS a part.


  Phase 1 of 3: Parts API + physics.

  Phase 2: Car loader + seed car migration.

  Phase 3: Live code terminal + TRON car diagnostic UI.

  '
