description: 'Research-driven sprint to close the gap between NPC Race physics and
  real F1.

  Two critical missing systems (dirty air, speed-dependent downforce) plus

  calibration fixes from TUMFTM academic data and Fast-F1 telemetry.


  Research doc: docs/research-realism-calibration.md


  Philosophy: NPC Race is a strategy sim, not a driving sim. We need physics

  that creates realistic DECISION SPACE, not realistic G-forces. "GT-level"

  means realistic lap times, realistic pit strategy tradeoffs, and realistic

  tire management — not per-wheel slip angle simulation.

  '
