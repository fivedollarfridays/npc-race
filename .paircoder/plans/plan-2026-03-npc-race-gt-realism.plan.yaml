critical_insight: "The two most impactful additions from research:\n\n1. DIRTY AIR\
  \ — Following a car closely in corners REDUCES grip (dirty turbulent\n   air reduces\
  \ downforce). This creates the F1 overtaking dilemma: you can draft\n   on straights\
  \ but lose grip in corners. Without this, following is pure upside.\n   Source:\
  \ f1metrics model uses 1.1x tire deg when following; FormulaGPT models\n   dirty\
  \ air as a speed penalty.\n\n2. SPEED-DEPENDENT DOWNFORCE — Grip increases with\
  \ speed² (aero generates\n   downforce). This makes wing angle setup meaningful:\
  \ high wing = fast corners\n   but slow straights. Without this, all corners are\
  \ equally easy regardless of\n   speed, which is unrealistic.\n"
