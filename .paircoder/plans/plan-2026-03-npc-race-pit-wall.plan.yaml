id: plan-2026-03-npc-race-pit-wall
title: "Sprint 8: Pit Wall Dashboard"
type: feature
status: planned
created: "2026-03-18"
sprint: 8
total_complexity: 155

description: |
  Transform the viewer from "watch a race" into "run a pit wall."
  Track animation shrinks to one panel. The rest is dense scientific telemetry:
  timing tower, car telemetry readouts, time-series strips, sector deltas.

  The feedback loop: player sees their car lost 0.3s in sector 2 because of
  dirty air → changes strategy code → runs again → sector 2 is green.

  Design doc: docs/design-pit-wall-dashboard.md

