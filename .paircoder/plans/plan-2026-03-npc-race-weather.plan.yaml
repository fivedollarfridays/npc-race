description: 'Add dynamic weather to races. Track wetness transitions from dry to
  wet

  and back. Wrong tire compound = catastrophic grip loss. New intermediate

  and wet compounds. Weather forecasts available to strategies but can be

  inaccurate. Transforms pit strategy from "when to stop" to "what to put on."


  CRITICAL CONSTRAINT: simulation.py is at 15/15 functions, 389/400 lines.

  ALL new logic goes in engine/weather_model.py. simulation.py only calls it.

  '
