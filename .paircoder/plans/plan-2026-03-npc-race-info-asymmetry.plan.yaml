description: |
  Transform strategy from perfect-information optimization to decision-making
  under uncertainty. Your car gets full telemetry; opponents show only what
  you could see from the cockpit (position, speed, gap, compound, tire age).
  Hidden: tire_wear, fuel, damage, tire_temp, engine_mode, ers_energy, brake_temp.

  simulation.py at 372/400 lines, 15/15 functions. This sprint adds ~5 lines
  (mostly filtering logic in a new module). No new functions in simulation.py.

