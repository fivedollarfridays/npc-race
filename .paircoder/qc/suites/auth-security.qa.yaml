name: Auth & Security
description: Verify authentication, access control, and rate limiting
tags: [critical, security]
preconditions:
  - "Server running at ${QC_BASE_URL}"

scenarios:
  - name: Unauthenticated access blocked
    steps:
      - navigate: "${QC_API_URL}/cars"
      - verify: "Response is 401 or 'API key required' message"

  - name: Register flow works
    tags: [write]
    steps:
      - navigate: "${QC_API_URL}/docs"
      - verify: "POST /api/register endpoint available"
      # Manual: use Swagger to POST /api/register, verify api_key returned

  - name: Source size limit enforced
    tags: [write, security]
    steps:
      - verify: "POST /api/submit-car with >32KB source returns 400 or 422"
      # This is better tested via API client, not browser
