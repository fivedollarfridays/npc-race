name: Editor Flow
description: Verify car code editor loads, accepts code, and submits successfully
tags: [critical, write]
preconditions:
  - "Server running at ${base_url}"

scenarios:
  - name: Editor loads with template
    steps:
      - navigate: "${base_url}/static/editor.html"
      - verify: "Monaco editor visible with Python syntax highlighting"
      - verify: "Template code contains CAR_NAME"
      - verify: "Submit button visible"

  - name: Submit valid car
    steps:
      - navigate: "${base_url}/static/editor.html"
      - verify: "Editor contains default car template"
      - click: "Submit button"
      - verify: "Success message or lobby status appears"
      - verify: "No error messages visible"

  - name: Analysis panels update
    steps:
      - navigate: "${base_url}/static/editor.html"
      - verify: "Parts detection panel visible"
      - verify: "League indicator shows F3"
      - verify: "Quality meter visible"

  - name: Validation error shown
    tags: [error-handling]
    steps:
      - navigate: "${base_url}/static/editor.html"
      - fill:
          field: "Monaco editor"
          value: "import os\nCAR_NAME = 'Bad'"
      - click: "Submit button"
      - verify: "Error message mentions banned import or violation"
