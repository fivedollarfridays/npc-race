environments:
  dev:
    variables:
      QC_BASE_URL: "http://localhost:8000"
      QC_API_URL: "http://localhost:8000/api"
    chrome:
      require_login: false

  staging:
    variables:
      QC_BASE_URL: "${STAGING_URL}"
      QC_API_URL: "${STAGING_URL}/api"
    chrome:
      require_login: false
    restrictions:
      skip_tags:
        - destructive

  prod:
    variables:
      QC_BASE_URL: "${PROD_URL}"
      QC_API_URL: "${PROD_URL}/api"
    chrome:
      require_login: false
    restrictions:
      read_only: true
      skip_tags:
        - destructive
        - write

default_environment: dev
